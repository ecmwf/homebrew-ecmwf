name: brew test-bot bottles

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled

permissions:
  actions: read
  checks: read
  contents: read
  issues: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}

jobs:
  syntax:
    runs-on: ubuntu-24.04
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Cache Homebrew Bundler RubyGems
        id: cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-${{ runner.arch }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-rubygems-

      - name: Install Homebrew Bundler RubyGems
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: brew install-bundler-gems

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

  test-bot:
    needs: syntax
    if: ${{ github.event_name == 'pull_request' && github.triggering_actor != 'github-actions[bot]' && (github.event.pull_request.head.repo.fork == false || contains(github.event.pull_request.labels.*.name, 'approved-for-ci')) }}
    env:
      HOMEBREW_GH_REPO_READ_TOKEN: ${{ secrets.GH_REPO_READ_TOKEN }}
      HOMEBREW_BITBUCKET_PAT: ${{ secrets.BITBUCKET_PAT }}
      HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
      GIT_TERMINAL_PROMPT: 0
      HOMEBREW_DEVELOPER: 1
      HOMEBREW_NO_INSTALL_FROM_API: 1
    strategy:
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-14
          - macos-15
          - macos-26
          - macos-15-intel
          - macos-26-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Cache Homebrew Bundler RubyGems
        id: cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-${{ runner.arch }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-rubygems-

      - name: Install Homebrew Bundler RubyGems
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: brew install-bundler-gems

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - name: Build bottles
        env:
          HOMEBREW_ECMWF_BUILD_LOG: /tmp/ecmwf-toolbox-build.log
        run: >
          brew test-bot --only-formulae --fail-fast --skip-online-checks --skip-new
          --root-url https://get-test.ecmwf.int/repository/homebrew

      - name: Upload ecmwf-toolbox build log to Nexus
        if: always()
        run: |
          LOG_FILE="/tmp/ecmwf-toolbox-build.log"
          if [ -f "$LOG_FILE" ]; then
            LOG_NAME="build-${{ github.run_id }}-${{ matrix.runner }}.log"
            response=$(curl -sf -w "%{http_code}" \
              --user "${{ secrets.NEXUS_PUBLIC_TEST_REPO_UPLOAD_TOKEN }}" \
              --upload-file "$LOG_FILE" \
              "https://get-test.ecmwf.int/repository/homebrew/build-logs/${{ github.run_id }}/$LOG_NAME")
            status=$(echo "$response" | tail -c 4)
            if [ "$status" -eq 201 ] || [ "$status" -eq 200 ]; then
              echo "Build log uploaded: logs/$LOG_NAME"
            else
              echo "Warning: Failed to upload build log (HTTP $status)"
            fi
          fi

      - name: Upload bottles as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bottles_${{ matrix.runner }}
          path: "*.bottle.*"
